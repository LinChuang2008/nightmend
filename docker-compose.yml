services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nightmend}
      POSTGRES_USER: ${POSTGRES_USER:-nightmend}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nightmend_dev_password}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nightmend}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    environment:
      TZ: Asia/Shanghai
    command: redis-server --requirepass ${REDIS_PASSWORD:-nightmend_dev}
    ports:
      - "127.0.0.1:${REDIS_PORT:-6380}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-nightmend_dev}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ClickHouse 高性能日志存储 (ClickHouse High-Performance Log Storage)
  clickhouse:
    image: clickhouse/clickhouse-server:24.1-alpine
    ports:
      - "127.0.0.1:${CLICKHOUSE_HTTP_PORT:-8123}:8123"  # HTTP接口 (HTTP Interface)
      - "127.0.0.1:${CLICKHOUSE_TCP_PORT:-9000}:9000"   # TCP接口 (TCP Interface)
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-nightmend}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-nightmend_ch_dev}
      TZ: Asia/Shanghai
    volumes:
      - clickhousedata:/var/lib/clickhouse
      - ./clickhouse-config:/etc/clickhouse-server/conf.d
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    profiles:
      - clickhouse

  # Prometheus sidecar — NightMend 的 TSDB + PromQL 引擎后端 (可选)
  # 启用方式: docker compose --profile prometheus up -d
  # 开启后，backend 若设置 PROMETHEUS_REMOTE_ENABLED=true，promql 查询会转发到这里。
  prometheus:
    image: prom/prometheus:v2.55.1
    environment:
      TZ: Asia/Shanghai
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}
      - --web.enable-lifecycle                    # 支持 POST /-/reload 热加载规则
      - --web.enable-remote-write-receiver        # 允许外部 Prom push 数据进来
      - --web.listen-address=:9090
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - ./prometheus/targets:/etc/prometheus/targets:ro
      - prometheusdata:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    profiles:
      - prometheus

  # Alertmanager — Prometheus 告警分组/去重/抑制，回投 NightMend webhook (可选)
  # 启用方式: docker compose --profile prometheus up -d alertmanager
  # 闭环：Prom rule fire → AM → /api/v1/webhooks/alertmanager → AI 诊断 + runbook
  alertmanager:
    build: ./alertmanager
    environment:
      TZ: Asia/Shanghai
      NIGHTMEND_WEBHOOK_URL: ${NIGHTMEND_WEBHOOK_URL:-http://backend:8000/api/v1/webhooks/alertmanager}
      # 必须非空；由 alertmanager/entrypoint.sh 在容器启动时强制校验
      ALERTMANAGER_WEBHOOK_TOKEN: ${ALERTMANAGER_WEBHOOK_TOKEN:-}
    ports:
      - "127.0.0.1:${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - alertmanagerdata:/alertmanager
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - prometheus

  # Grafana Loki 日志聚合 (Grafana Loki Log Aggregation) - 可选
  loki:
    image: grafana/loki:2.9.0
    environment:
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${LOKI_PORT:-3100}:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - lokidata:/loki
    restart: unless-stopped
    profiles:
      - loki

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    env_file: .env
    environment:
      # Override port vars so backend connects to container-internal ports,
      # not the host-mapped ports from .env
      REDIS_PORT: 6379
      POSTGRES_PORT: 5432
      TZ: Asia/Shanghai
    command: ["/bin/sh", "/app/scripts/startup.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./agent:/app/agent
    restart: unless-stopped

  # MCP Server - 独立运行的 Model Context Protocol 服务 (MCP Server - Standalone service)
  mcp:
    build: ./backend
    ports:
      - "127.0.0.1:${MCP_PORT:-8003}:8003"
    env_file: .env
    environment:
      # MCP 环境变量
      NIGHTMEND_MCP_ENABLED: "true"
      NIGHTMEND_MCP_HOST: "0.0.0.0"
      NIGHTMEND_MCP_PORT: "8003"
      REDIS_PORT: 6379
      POSTGRES_PORT: 5432
      TZ: Asia/Shanghai
    command: ["python", "-m", "app.mcp.server"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      TZ: Asia/Shanghai
    ports:
      - "${FRONTEND_PORT:-3001}:80"
    depends_on:
      - backend
    restart: unless-stopped

# 备份说明 (Backup Instructions):
# 手动备份: bash scripts/backup.sh
# 定时备份 (cron): 0 2 * * * cd /path/to/nightmend && bash scripts/backup.sh >> logs/backup.log 2>&1
# 恢复: bash scripts/restore.sh backups/nightmend_YYYYMMDD_HHMMSS.sql.gz

volumes:
  pgdata:
  redisdata:
  clickhousedata:
  lokidata:
  prometheusdata:
  alertmanagerdata:
