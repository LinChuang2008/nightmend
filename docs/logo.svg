<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-label="NightMend">
  <!--
    NightMend brand logo · 与 frontend/src/components/Logo.tsx 的
    IconSVG 完全一致（盾牌 + 闭眼 + 5 条睫毛/针脚 + 心跳波形 +
    波峰亮点），用于 README / docs / 外部发布物。

    语义:
      · 盾牌 = 守护
      · 闭眼 = 你睡
      · 针脚 = 修补（sleep + 修补双关）
      · 心跳 = AI 仍醒着做事
  -->

  <!-- 盾牌外形 · 深底 + 蓝描边 -->
  <path
    d="M 12 8 L 52 8 Q 56 8 56 12 L 56 32 Q 56 48 32 60 Q 8 48 8 32 L 8 12 Q 8 8 12 8 Z"
    fill="#0a0a0f"
    stroke="#3b82f6"
    stroke-width="3"
    stroke-linejoin="round"
  />

  <!-- 闭眼 -->
  <path
    d="M 18 26 Q 32 33 46 26"
    stroke="#e4e4e7"
    stroke-width="3"
    stroke-linecap="round"
    fill="none"
  />

  <!-- 睫毛 / 针脚 -->
  <line x1="22" y1="24"   x2="21" y2="20" stroke="#e4e4e7" stroke-width="2" stroke-linecap="round"/>
  <line x1="27" y1="25"   x2="26" y2="20" stroke="#e4e4e7" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="25.5" x2="32" y2="20" stroke="#e4e4e7" stroke-width="2" stroke-linecap="round"/>
  <line x1="37" y1="25"   x2="38" y2="20" stroke="#e4e4e7" stroke-width="2" stroke-linecap="round"/>
  <line x1="42" y1="24"   x2="43" y2="20" stroke="#e4e4e7" stroke-width="2" stroke-linecap="round"/>

  <!-- 心跳波形 -->
  <path
    d="M 13 42 L 20 42 L 23 37 L 27 48 L 31 42 L 38 42 L 41 45 L 45 38 L 51 42"
    stroke="#3b82f6"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- 波峰亮点 -->
  <circle cx="27" cy="48" r="2" fill="#3b82f6"/>
</svg>
